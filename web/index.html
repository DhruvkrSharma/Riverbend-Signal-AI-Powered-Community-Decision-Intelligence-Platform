<title>Riverbend Signal — Community Decision Intelligence</title>
<div id="app" data-view="overview"></div>

<style>
/* =============================================================================
   Riverbend Signal — Community Decision Intelligence Platform
   Palette: cool blue-biased neutrals + deep teal accent. Chart series use the
   dataviz reference categorical slots 1–5 (validated). Status colors reserved.
   ========================================================================== */
/* ---- DARK-FIRST design system (sleek glass + gradient) ---- */
:root{
  color-scheme:dark;
  --bg:#05070b; --plane:#080b11; --surface:#0f1620; --surface-2:#161f2b;
  --border:rgba(255,255,255,.08); --border-strong:rgba(255,255,255,.16);
  --text:#f2f7fc; --text-2:#aebfd1; --muted:#8091a5;
  --accent:#22d3ee; --accent-2:#7c3aed; --accent-ink:#04121a; --accent-weak:rgba(34,211,238,.13);
  --grad:linear-gradient(135deg,#22d3ee 0%,#6366f1 55%,#a855f7 100%);
  --grad-soft:linear-gradient(135deg,rgba(34,211,238,.16),rgba(124,58,237,.16));
  --glow:0 0 24px -4px rgba(34,211,238,.45);
  --glass:rgba(16,23,33,.62); --glass-2:rgba(22,31,43,.55); --glass-border:rgba(255,255,255,.09);
  --good:#22c55e; --warning:#fab219; --serious:#f97316; --critical:#f43f5e;
  --good-weak:rgba(34,197,94,.15); --warning-weak:rgba(250,178,25,.15); --serious-weak:rgba(249,115,22,.15); --critical-weak:rgba(244,63,94,.15);
  --c-air:#3987e5; --c-climate:#199e70; --c-energy:#c98500; --c-water:#008300; --c-wellness:#9085e9;
  --chart-grid:rgba(255,255,255,.06); --chart-axis:rgba(255,255,255,.16); --chart-ink:#eaf1f8;
  --chart-surface:#0f1620;
  --mesh-1:#0891b2; --mesh-2:#6d28d9; --mesh-3:#0f766e; --mesh-a:.55;
  --shadow:0 1px 2px rgba(0,0,0,.5), 0 10px 34px -16px rgba(0,0,0,.8);
  --shadow-lg:0 24px 60px -20px rgba(0,0,0,.85);
  --radius:16px; --radius-sm:10px;
  --sans:system-ui,-apple-system,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
  --mono:ui-monospace,"SF Mono","Cascadia Mono",Menlo,Consolas,monospace;
}
:root[data-theme="dark"]{color-scheme:dark}
:root[data-theme="light"]{
  color-scheme:light;
  --bg:#eef2f7; --plane:#f5f8fc; --surface:#ffffff; --surface-2:#eef3f9;
  --border:rgba(16,32,50,.10); --border-strong:rgba(16,32,50,.20);
  --text:#0c1622; --text-2:#4a5a6d; --muted:#8091a3;
  --accent:#0891b2; --accent-2:#7c3aed; --accent-ink:#ffffff; --accent-weak:rgba(8,145,178,.12);
  --grad:linear-gradient(135deg,#06b6d4 0%,#6366f1 55%,#a855f7 100%);
  --grad-soft:linear-gradient(135deg,rgba(6,182,212,.12),rgba(124,58,237,.12));
  --glow:0 0 24px -6px rgba(8,145,178,.4);
  --glass:rgba(255,255,255,.7); --glass-2:rgba(255,255,255,.6); --glass-border:rgba(16,32,50,.08);
  --good:#059669; --warning:#c98500; --serious:#ea580c; --critical:#e11d48;
  --good-weak:rgba(5,150,105,.12); --warning-weak:rgba(201,133,0,.14); --serious-weak:rgba(234,88,12,.12); --critical-weak:rgba(225,29,72,.1);
  --c-air:#2a78d6; --c-climate:#178a63; --c-energy:#b07400; --c-water:#0f7d33; --c-wellness:#6d28d9;
  --chart-grid:rgba(16,32,50,.07); --chart-axis:rgba(16,32,50,.2); --chart-ink:#0c1622;
  --chart-surface:#ffffff;
  --mesh-1:#67e8f9; --mesh-2:#c4b5fd; --mesh-3:#6ee7b7; --mesh-a:.5;
  --shadow:0 1px 2px rgba(16,32,50,.05), 0 10px 30px -14px rgba(16,32,50,.22);
  --shadow-lg:0 24px 60px -22px rgba(16,32,50,.3);
}

*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{margin:0;background:var(--bg);color:var(--text);font-family:var(--sans);
  font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased;overflow-x:hidden;}
/* animated gradient-mesh backdrop */
body::before{content:"";position:fixed;inset:-20%;z-index:-2;pointer-events:none;
  background:
    radial-gradient(42vw 42vw at 12% 8%, var(--mesh-1) 0%, transparent 60%),
    radial-gradient(46vw 46vw at 88% 12%, var(--mesh-2) 0%, transparent 62%),
    radial-gradient(50vw 50vw at 70% 96%, var(--mesh-3) 0%, transparent 60%);
  opacity:var(--mesh-a);filter:blur(52px) saturate(120%);
  animation:mesh 26s ease-in-out infinite alternate;}
body::after{content:"";position:fixed;inset:0;z-index:-1;pointer-events:none;
  background:radial-gradient(120% 90% at 50% 0%, transparent 40%, var(--bg) 92%);}
@keyframes mesh{
  0%{transform:translate3d(0,0,0) scale(1)}
  50%{transform:translate3d(2%,-2%,0) scale(1.08)}
  100%{transform:translate3d(-2%,2%,0) scale(1.04)}}
#app{min-height:100vh;position:relative}
h1,h2,h3,h4{margin:0;font-weight:670;letter-spacing:-.015em;text-wrap:balance;}
a{color:inherit}
.tnum{font-variant-numeric:tabular-nums}
button{font-family:inherit;cursor:pointer}
:focus-visible{outline:2.5px solid var(--accent);outline-offset:2px;border-radius:6px}
/* custom scrollbars */
*::-webkit-scrollbar{width:11px;height:11px}
*::-webkit-scrollbar-thumb{background:var(--border-strong);border-radius:20px;border:3px solid transparent;background-clip:content-box}
*::-webkit-scrollbar-thumb:hover{background:var(--muted);background-clip:content-box}
*::-webkit-scrollbar-track{background:transparent}

/* ---- shell layout ---- */
.shell{display:grid;grid-template-columns:264px 1fr;min-height:100vh}
.sidebar{position:sticky;top:0;height:100vh;background:var(--surface);
  border-right:1px solid var(--border);display:flex;flex-direction:column;
  padding:18px 14px;gap:6px;z-index:40;overflow-y:auto}
.brand{display:flex;align-items:center;gap:11px;padding:6px 8px 14px}
.brand .mark{width:34px;height:34px;border-radius:9px;flex:none;
  background:linear-gradient(150deg,var(--accent),var(--accent-2));
  display:grid;place-items:center;color:var(--accent-ink);box-shadow:var(--shadow)}
.brand .mark svg{width:19px;height:19px}
.brand b{font-size:15px;letter-spacing:-.02em;display:block;line-height:1.1}
.brand span{font-size:11px;color:var(--muted);letter-spacing:.04em;text-transform:uppercase}

.loc-picker{position:relative;margin:2px 4px 12px}
.loc-btn{width:100%;display:flex;align-items:center;gap:9px;padding:9px 11px;
  background:var(--surface-2);border:1px solid var(--border);border-radius:10px;
  color:var(--text);text-align:left;transition:border-color .15s,background .15s}
.loc-btn:hover{border-color:var(--border-strong)}
.loc-btn .flag{font-size:17px;line-height:1}
.loc-btn .lz{flex:1;min-width:0}
.loc-btn .lz b{font-size:13.5px;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.loc-btn .lz small{font-size:11px;color:var(--muted)}
.loc-btn .chev{color:var(--muted);transition:transform .18s}
.loc-picker.open .chev{transform:rotate(180deg)}
.loc-menu{position:absolute;top:calc(100% + 6px);left:0;right:0;background:var(--surface);
  border:1px solid var(--border);border-radius:12px;box-shadow:var(--shadow-lg);
  padding:6px;z-index:60;display:none}
.loc-picker.open .loc-menu{display:block;animation:pop .16s ease}
.loc-menu button{width:100%;display:flex;align-items:center;gap:9px;padding:8px 9px;
  background:none;border:0;border-radius:8px;color:var(--text);text-align:left;font-size:13.5px}
.loc-menu button:hover{background:var(--surface-2)}
.loc-menu button[aria-selected="true"]{background:var(--accent-weak);color:var(--accent)}
.loc-menu .mini{font-size:11px;color:var(--muted);margin-left:auto}

.nav-label{font-size:10.5px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;
  color:var(--muted);padding:12px 10px 5px}
.nav-item{display:flex;align-items:center;gap:11px;padding:9px 11px;border-radius:9px;
  color:var(--text-2);border:0;background:none;width:100%;text-align:left;font-size:14px;
  font-weight:520;transition:background .14s,color .14s;position:relative}
.nav-item:hover{background:var(--surface-2);color:var(--text)}
.nav-item.active{background:var(--accent-weak);color:var(--accent);font-weight:620}
.nav-item .ic{width:19px;height:19px;flex:none;display:grid;place-items:center}
.nav-item .ic svg{width:18px;height:18px}
.nav-item .dot{width:9px;height:9px;border-radius:50%;flex:none}
.nav-item .badge{margin-left:auto;font-size:11px;font-weight:700;padding:1px 7px;border-radius:20px;
  background:var(--critical);color:#fff;min-width:20px;text-align:center}
.nav-item .badge.zero{display:none}
.sidebar .spacer{flex:1}
.side-foot{border-top:1px solid var(--border);padding:12px 8px 4px;margin-top:8px;
  font-size:11px;color:var(--muted);line-height:1.5}
.side-foot a{color:var(--accent);text-decoration:none}

.theme-toggle{display:flex;align-items:center;gap:7px;padding:8px 10px;border-radius:9px;
  border:1px solid var(--border);background:var(--surface-2);color:var(--text-2);
  font-size:13px;font-weight:550;margin-bottom:10px}
.theme-toggle:hover{border-color:var(--border-strong);color:var(--text)}
.theme-toggle svg{width:16px;height:16px}

/* ---- main ---- */
.main{min-width:0;display:flex;flex-direction:column}
.topbar{position:sticky;top:0;background:color-mix(in srgb,var(--plane) 86%,transparent);
  backdrop-filter:blur(10px);border-bottom:1px solid var(--border);z-index:30;
  padding:15px 30px;display:flex;align-items:center;gap:16px}
.topbar .menu-btn{display:none;background:var(--surface-2);border:1px solid var(--border);
  border-radius:8px;padding:7px;color:var(--text)}
.topbar h1{font-size:19px}
.topbar .sub{font-size:12.5px;color:var(--muted);margin-top:1px}
.topbar .asof{margin-left:auto;text-align:right;font-size:12px;color:var(--muted)}
.topbar .asof b{color:var(--text-2);font-weight:600}
.pulse{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--good);
  margin-right:5px;box-shadow:0 0 0 0 rgba(12,163,12,.5);animation:pulse 2.4s infinite}
@media (prefers-reduced-motion:reduce){.pulse{animation:none}}

.view{padding:26px 30px 60px;max-width:1240px;width:100%;animation:fade .3s ease}
.view-intro{margin-bottom:20px}
.view-intro h2{font-size:23px}
.view-intro p{color:var(--text-2);margin:5px 0 0;max-width:70ch;font-size:14px}

/* ---- cards / grid ---- */
.grid{display:grid;gap:16px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  box-shadow:var(--shadow)}
.card-pad{padding:18px}
.card-h{display:flex;align-items:center;gap:10px;padding:15px 18px;border-bottom:1px solid var(--border)}
.card-h h3{font-size:15px}
.card-h .sub{font-size:12px;color:var(--muted)}
.card-h .right{margin-left:auto;display:flex;gap:8px;align-items:center}

/* ---- stat tiles ---- */
.tiles{display:grid;grid-template-columns:repeat(auto-fit,minmax(232px,1fr));gap:15px}
.tile{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  padding:16px 17px;box-shadow:var(--shadow);cursor:pointer;position:relative;overflow:hidden;
  transition:transform .16s,box-shadow .16s,border-color .16s;text-align:left;width:100%;
  color:var(--text);font-size:15px;line-height:1.5}
.tile:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg);border-color:var(--border-strong)}
.tile .rail{position:absolute;left:0;top:0;bottom:0;width:3px}
.tile .th{display:flex;align-items:center;gap:8px;font-size:12.5px;color:var(--text-2);font-weight:620}
.tile .th .cdot{width:9px;height:9px;border-radius:50%;flex:none}
.tile .val{font-size:31px;font-weight:700;letter-spacing:-.02em;margin-top:9px;display:flex;
  align-items:baseline;gap:6px;color:var(--text)}
.tile .val .u{font-size:13px;color:var(--muted);font-weight:600}
.tile .meta{display:flex;align-items:center;gap:8px;margin-top:6px;font-size:12px;flex-wrap:wrap}
.delta{display:inline-flex;align-items:center;gap:4px;font-weight:680;font-variant-numeric:tabular-nums;
  font-size:11.5px;padding:2.5px 9px;border-radius:20px}
.delta.pos{color:var(--good);background:var(--good-weak)}
.delta.neg{color:var(--critical);background:var(--critical-weak)}
.delta.neu{color:var(--text-2);background:var(--surface-2)}
.tile .spark{margin-top:12px;height:42px}
.tile .status-pill{margin-left:auto}

.pill{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:680;
  padding:2px 9px;border-radius:20px;letter-spacing:.01em;white-space:nowrap}
.pill svg{width:12px;height:12px}
.pill.good{background:var(--good-weak);color:var(--good)}
.pill.warning{background:var(--warning-weak);color:var(--warning)}
.pill.serious{background:var(--serious-weak);color:var(--serious)}
.pill.critical{background:var(--critical-weak);color:var(--critical)}
.pill.info{background:var(--accent-weak);color:var(--accent)}
.pill.ghost{background:var(--surface-2);color:var(--text-2)}

/* ---- charts ---- */
.chart-wrap{position:relative;width:100%}
.chart-wrap svg{display:block;width:100%;overflow:visible}
.chart-tt{position:absolute;pointer-events:none;background:var(--surface);border:1px solid var(--border-strong);
  border-radius:9px;box-shadow:var(--shadow-lg);padding:8px 11px;font-size:12px;z-index:20;
  opacity:0;transition:opacity .12s;min-width:120px}
.chart-tt .d{color:var(--muted);font-size:11px;margin-bottom:3px}
.chart-tt .r{display:flex;align-items:center;gap:6px;font-weight:600}
.chart-tt .r .sw{width:9px;height:9px;border-radius:2px;flex:none}
.chart-tt .r .v{margin-left:auto;font-variant-numeric:tabular-nums}
.legend{display:flex;flex-wrap:wrap;gap:14px;font-size:12px;color:var(--text-2);padding:4px 2px 0}
.legend .li{display:inline-flex;align-items:center;gap:6px}
.legend .sw{width:11px;height:3px;border-radius:2px}
.legend .sw.dash{background:repeating-linear-gradient(90deg,currentColor 0 4px,transparent 4px 7px);height:2px;width:14px}

/* ---- segmented / controls ---- */
.seg{display:inline-flex;background:var(--surface-2);border:1px solid var(--border);border-radius:9px;padding:3px}
.seg button{border:0;background:none;color:var(--text-2);font-size:12.5px;font-weight:600;
  padding:5px 11px;border-radius:6px;transition:background .14s,color .14s}
.seg button.on{background:var(--surface);color:var(--text);box-shadow:var(--shadow)}
.selctl{background:var(--surface-2);border:1px solid var(--border);border-radius:9px;color:var(--text);
  padding:7px 11px;font-size:13px;font-weight:550;font-family:inherit}
.toggle{display:inline-flex;align-items:center;gap:7px;font-size:12.5px;color:var(--text-2);
  background:var(--surface-2);border:1px solid var(--border);border-radius:9px;padding:6px 11px;font-weight:600}
.toggle input{accent-color:var(--accent)}

/* ---- anomaly / rec list ---- */
.feed{display:flex;flex-direction:column}
.arow{display:flex;align-items:center;gap:14px;padding:14px 18px;border-bottom:1px solid var(--border);
  cursor:pointer;transition:background .12s}
.arow:last-child{border-bottom:0}
.arow:hover{background:var(--surface-2)}
.arow .sev{width:4px;align-self:stretch;border-radius:3px;flex:none;min-height:38px}
.arow .icn{width:34px;height:34px;border-radius:9px;display:grid;place-items:center;flex:none;
  background:var(--surface-2);color:var(--text-2)}
.arow .body{flex:1;min-width:0}
.arow .body b{font-size:14px}
.arow .body .m{font-size:12.5px;color:var(--text-2);margin-top:1px}
.arow .rt{text-align:right;flex:none}
.arow .rt .z{font-size:16px;font-weight:700;font-variant-numeric:tabular-nums}
.arow .rt .dt{font-size:11.5px;color:var(--muted)}
.arow .dir{font-size:15px}

.recs{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:16px}
.rec{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  box-shadow:var(--shadow);padding:17px;display:flex;flex-direction:column;gap:10px;
  border-left:4px solid var(--muted)}
.rec.critical{border-left-color:var(--critical)} .rec.serious{border-left-color:var(--serious)}
.rec.info{border-left-color:var(--accent)}
.rec .rh{display:flex;align-items:center;gap:8px}
.rec h4{font-size:15px;line-height:1.3}
.rec .act{font-size:13.5px;color:var(--text-2)}
.rec .why{font-size:12.5px;color:var(--muted);border-left:2px solid var(--border);padding-left:9px}
.rec .tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:auto}
.tag{font-size:11px;font-weight:600;padding:3px 9px;border-radius:7px;background:var(--surface-2);
  color:var(--text-2);border:1px solid var(--border)}
.rec .ev{font-size:11px;color:var(--muted);font-family:var(--mono)}

/* ---- ask ---- */
.ask-wrap{display:flex;flex-direction:column;gap:0;height:calc(100vh - 128px);min-height:460px}
.ask-scroll{flex:1;overflow-y:auto;padding:8px 2px 18px;display:flex;flex-direction:column;gap:16px}
.chips{display:flex;flex-wrap:wrap;gap:8px;margin:2px 0 6px}
.chip{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:7px 13px;
  font-size:12.5px;color:var(--text-2);font-weight:550;transition:border-color .14s,color .14s,background .14s}
.chip:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-weak)}
.msg{display:flex;gap:11px;max-width:820px}
.msg.user{align-self:flex-end;flex-direction:row-reverse}
.msg .av{width:30px;height:30px;border-radius:8px;flex:none;display:grid;place-items:center;font-size:13px;font-weight:700}
.msg.user .av{background:var(--accent);color:var(--accent-ink)}
.msg.bot .av{background:linear-gradient(150deg,var(--accent),var(--accent-2));color:var(--accent-ink)}
.bubble{background:var(--surface);border:1px solid var(--border);border-radius:13px;padding:13px 15px;
  box-shadow:var(--shadow);font-size:14px}
.msg.user .bubble{background:var(--accent);color:var(--accent-ink);border-color:transparent}
.bubble .eng{font-size:10.5px;color:var(--muted);margin-top:9px;display:flex;align-items:center;gap:6px;
  text-transform:uppercase;letter-spacing:.05em;font-weight:600}
.bubble .eng .d{width:6px;height:6px;border-radius:50%;background:var(--accent)}
.bubble .qchart{margin-top:12px;border-top:1px solid var(--border);padding-top:12px}
.ask-bar{display:flex;gap:10px;padding-top:14px;border-top:1px solid var(--border)}
.ask-bar input{flex:1;background:var(--surface);border:1px solid var(--border-strong);border-radius:11px;
  padding:12px 15px;font-size:14px;color:var(--text);font-family:inherit}
.ask-bar input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-weak)}
.ask-bar button{background:var(--accent);color:var(--accent-ink);border:0;border-radius:11px;
  padding:0 20px;font-weight:650;font-size:14px;display:flex;align-items:center;gap:7px}
.ask-bar button:hover{background:var(--accent-2)}
.typing{display:inline-flex;gap:3px}
.typing i{width:6px;height:6px;border-radius:50%;background:var(--muted);animation:blink 1.2s infinite}
.typing i:nth-child(2){animation-delay:.2s}.typing i:nth-child(3){animation-delay:.4s}

.banner{display:flex;gap:11px;align-items:flex-start;background:var(--accent-weak);
  border:1px solid color-mix(in srgb,var(--accent) 30%,transparent);border-radius:11px;padding:12px 15px;
  font-size:12.5px;color:var(--text-2);margin-bottom:18px}
.banner svg{width:17px;height:17px;color:var(--accent);flex:none;margin-top:1px}
.banner b{color:var(--text)}

.empty{text-align:center;padding:50px 20px;color:var(--muted)}
.hscore{display:flex;align-items:center;gap:22px;flex-wrap:wrap}
.gauge{position:relative;width:118px;height:118px;flex:none}
.gauge .num{position:absolute;inset:0;display:grid;place-items:center;flex-direction:column;text-align:center}
.gauge .num b{font-size:30px;font-weight:720;line-height:1}
.gauge .num small{font-size:10px;color:var(--text-2);text-transform:uppercase;letter-spacing:.07em;font-weight:650}
.hscore .hx{flex:1;min-width:240px}
.hscore .hx h3{font-size:16px;margin-bottom:4px}
.hscore .hx p{color:var(--text-2);font-size:13.5px;margin:0}

@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
@keyframes pop{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:none}}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(12,163,12,.5)}70%{box-shadow:0 0 0 7px rgba(12,163,12,0)}100%{box-shadow:0 0 0 0 rgba(12,163,12,0)}}
@keyframes blink{0%,60%,100%{opacity:.3}30%{opacity:1}}

function healthScore(){

   <circle cx="${sx(pts[pts.length-1][0]).toFixed(1)}" cy="${sy(pts[pts.length-1][1]).toFixed(1)}" r="2.6" fill="${col}"/></svg>`;
}

/* main line chart with forecast band, anomaly markers, hover crosshair */
function renderLine(container,cfg){ container.__line=cfg; drawLine(container); }
function drawLine(c){
  const cfg=c.__line; const W=c.clientWidth||600, H=cfg.height||300;
  const padL=46,padR=16,padT=14,padB=26; const iw=W-padL-padR, ih=H-padT-padB;
  const col=cvar(cfg.colorVar||"--c-air");
  // unified points: observed then forecast
  let pts=cfg.points; const allV=[];
  pts.forEach(p=>{if(p.v!=null)allV.push(p.v); if(p.lo!=null)allV.push(p.lo); if(p.hi!=null)allV.push(p.hi);});
  if(allV.length<2){c.innerHTML='<div class="empty">Not enough data to plot.</div>';return;}
  let ymin=Math.min(...allV),ymax=Math.max(...allV); if(ymin===ymax){ymax+=1;ymin-=1;}
  const span=ymax-ymin; ymin-=span*0.08; ymax+=span*0.08; if(cfg.zeroBase&&ymin>0)ymin=0;
  const n=pts.length;
  const sx=i=>padL+(n<=1?0:i/(n-1)*iw), sy=v=>padT+ih-(v-ymin)/(ymax-ymin)*ih;
  const grid=cvar("--chart-grid"),axis=cvar("--chart-axis"),muted=cvar("--muted");
  // y ticks
  const ticks=4; let gl="",yl="";
  for(let t=0;t<=ticks;t++){const val=ymin+(ymax-ymin)*t/ticks;const Y=sy(val).toFixed(1);
    gl+=`<line x1="${padL}" x2="${W-padR}" y1="${Y}" y2="${Y}" stroke="${grid}" stroke-width="1"/>`;
    yl+=`<text x="${padL-8}" y="${(+Y+3.5).toFixed(1)}" text-anchor="end" font-size="10.5" fill="${muted}">${fmt(val)}</text>`;}
  // x labels
  const fi=cfg.fcStart!=null?cfg.fcStart:n; let xl="";
  const nlab=Math.min(5,n); for(let k=0;k<nlab;k++){const i=Math.round(k/(nlab-1)*(n-1));
    const dt=pts[i].date.slice(5); xl+=`<text x="${sx(i).toFixed(1)}" y="${H-8}" text-anchor="${k===0?'start':k===nlab-1?'end':'middle'}" font-size="10.5" fill="${muted}">${dt}</text>`;}
  // forecast band
  let band=""; if(cfg.fcStart!=null){
    let up="",dn=""; for(let i=cfg.fcStart-1;i<n;i++){const p=pts[i];const hi=p.hi!=null?p.hi:p.v,lo=p.lo!=null?p.lo:p.v;
      up+=(up?"L":"M")+sx(i).toFixed(1)+" "+sy(hi).toFixed(1); dn=sx(i).toFixed(1)+" "+sy(lo).toFixed(1)+" "+dn;}
    if(up)band=`<path d="${up}L${dn}Z" fill="${col}" fill-opacity=".12" stroke="none"/>`;
  }
  // observed & forecast lines
  const gid="lg"+Math.random().toString(36).slice(2,7);
  let obs="",farea=""; const oEnd=cfg.fcStart!=null?cfg.fcStart:n;
  for(let i=0;i<oEnd;i++){if(pts[i].v==null)continue;obs+=(obs?"L":"M")+sx(i).toFixed(1)+" "+sy(pts[i].v).toFixed(1);}
  // area under observed
  let area=""; if(cfg.area&&obs){const first=obs.indexOf("M");
    area=obs+`L${sx(oEnd-1).toFixed(1)} ${(padT+ih).toFixed(1)}L${sx(0).toFixed(1)} ${(padT+ih).toFixed(1)}Z`;}
  let fc=""; if(cfg.fcStart!=null){for(let i=cfg.fcStart-1;i<n;i++){const p=pts[i];if(p.v==null)continue;fc+=(fc?"L":"M")+sx(i).toFixed(1)+" "+sy(p.v).toFixed(1);}}
  // anomaly markers
  let am=""; (cfg.anomalies||[]).forEach(a=>{const i=pts.findIndex(p=>p.date===a.date);if(i<0||pts[i].v==null)return;
    const sc=sevColor(a.severity); am+=`<circle cx="${sx(i).toFixed(1)}" cy="${sy(pts[i].v).toFixed(1)}" r="4.4" fill="${sc}" stroke="var(--surface)" stroke-width="1.6"/>`;});
  // highlight
  let hl=""; if(cfg.highlight){const i=pts.findIndex(p=>p.date===cfg.highlight);if(i>=0&&pts[i].v!=null){
    hl=`<line x1="${sx(i).toFixed(1)}" x2="${sx(i).toFixed(1)}" y1="${padT}" y2="${padT+ih}" stroke="${col}" stroke-width="1" stroke-dasharray="3 3" opacity=".6"/>
        <circle cx="${sx(i).toFixed(1)}" cy="${sy(pts[i].v).toFixed(1)}" r="5.5" fill="${col}" stroke="var(--surface)" stroke-width="2"/>`;}}
  const fcDivider=cfg.fcStart!=null&&cfg.fcStart<n?`<line x1="${sx(cfg.fcStart-1).toFixed(1)}" x2="${sx(cfg.fcStart-1).toFixed(1)}" y1="${padT}" y2="${padT+ih}" stroke="${axis}" stroke-width="1" stroke-dasharray="2 3"/>`:"";
  c.innerHTML=`<svg viewBox="0 0 ${W} ${H}" width="${W}" height="${H}">
   <defs><linearGradient id="${gid}" x1="0" x2="0" y1="0" y2="1"><stop offset="0" stop-color="${col}" stop-opacity=".22"/><stop offset="1" stop-color="${col}" stop-opacity="0"/></linearGradient></defs>
   ${gl}${yl}${xl}${band}${fcDivider}
   ${area?`<path d="${area}" fill="url(#${gid})"/>`:""}
   <path d="${obs}" fill="none" stroke="${col}" stroke-width="2.1" stroke-linejoin="round" stroke-linecap="round"/>
   ${fc?`<path d="${fc}" fill="none" stroke="${col}" stroke-width="2.1" stroke-dasharray="5 4" stroke-linecap="round" opacity=".85"/>`:""}
   ${am}${hl}
   <rect class="hit" x="${padL}" y="${padT}" width="${iw}" height="${ih}" fill="transparent"/>
   <line class="cross" x1="0" x2="0" y1="${padT}" y2="${padT+ih}" stroke="${axis}" stroke-width="1" opacity="0"/>
   <circle class="focus" r="4.5" fill="${col}" stroke="var(--surface)" stroke-width="2" opacity="0"/>
  </svg>`;
  // hover
  const svg=c.querySelector("svg"), cross=c.querySelector(".cross"), focus=c.querySelector(".focus");
  let tt=c.querySelector(".chart-tt"); if(!tt){tt=el("div","chart-tt");c.appendChild(tt);}
  const hit=c.querySelector(".hit");
  hit.addEventListener("mousemove",e=>{
    const r=svg.getBoundingClientRect(); const px=(e.clientX-r.left)/r.width*W;
    let i=Math.round((px-padL)/(iw||1)*(n-1)); i=Math.max(0,Math.min(n-1,i));
    while(i<n&&pts[i].v==null)i++; if(i>=n||pts[i].v==null)return;
    const X=sx(i),Y=sy(pts[i].v);
    cross.setAttribute("x1",X);cross.setAttribute("x2",X);cross.setAttribute("opacity",".5");
    focus.setAttribute("cx",X);focus.setAttribute("cy",Y);focus.setAttribute("opacity","1");
    const isF=cfg.fcStart!=null&&i>=cfg.fcStart;
    tt.innerHTML=`<div class="d">${pts[i].date}${isF?" · forecast":""}</div><div class="r"><span class="sw" style="background:${col}"></span><span>${cfg.label}</span><span class="v tnum">${fmt(pts[i].v)} ${cfg.unit}</span></div>`+
      (isF&&pts[i].lo!=null?`<div class="r" style="color:var(--muted);font-weight:500"><span class="sw" style="background:transparent"></span><span>range</span><span class="v tnum">${fmt(pts[i].lo)}–${fmt(pts[i].hi)}</span></div>`:"");
    tt.style.opacity="1"; const left=Math.min(Math.max(X/W*r.width-tt.offsetWidth/2,4),r.width-tt.offsetWidth-4);
    tt.style.left=left+"px"; tt.style.top=(Y/H*r.height-tt.offsetHeight-12)+"px";
  });
  hit.addEventListener("mouseleave",()=>{tt.style.opacity="0";cross.setAttribute("opacity","0");focus.setAttribute("opacity","0");});
}

/* build points array for a metric over a date range, optionally with forecast */
function buildPoints(dom,met,rangeDays,withFc){
  const m=metricObj(dom,met), dates=D().dates, fs=D().forecast_start;
  let start=0; if(rangeDays&&rangeDays<fs)start=fs-rangeDays;
  const pts=[]; for(let i=start;i<fs;i++)pts.push({date:dates[i],v:m.values[i]});
  let fcStart=null;
  if(withFc){const F=D().forecasts[dom+"."+met];
    if(F){fcStart=pts.length; F.forecast.forEach(f=>pts.push({date:f.date,v:f.value,lo:f.lower,hi:f.upper}));}}
  return {pts,fcStart};
}

/* ---------- scroll-reveal, count-up, scroll-reactive header ---------- */
const REVEAL_SEL=".card,.tile,.rec,.arow,.view-intro,.banner,.msg,.hscore,.legend";
let _revObs=null;
const _reduceMotion=()=>matchMedia("(prefers-reduced-motion:reduce)").matches;
function applyReveal(root){
  const nodes=$$(REVEAL_SEL,root).filter(n=>!n.__rev);
  if(_reduceMotion()||!("IntersectionObserver" in window)){
    nodes.forEach(n=>{n.__rev=1;n.classList.add("in");countUpIn(n);});return;}
  if(!_revObs)_revObs=new IntersectionObserver(ents=>{ents.forEach(e=>{if(e.isIntersecting){
    const t=e.target;setTimeout(()=>{t.classList.add("in");countUpIn(t);},t.__revDelay||0);_revObs.unobserve(t);}});},
    {threshold:.08,rootMargin:"0px 0px -5% 0px"});
  const vh=window.innerHeight||800; let i=0;
  nodes.forEach(n=>{n.__rev=1;
    // elements already in view show immediately (never hide visible content);
    // only below-the-fold elements get the scroll-reveal treatment.
    if(n.getBoundingClientRect().top < vh*0.92){ n.classList.add("in"); countUpIn(n); }
    else { n.classList.add("reveal"); n.__revDelay=Math.min(i*55,340); i++; _revObs.observe(n); }
  });
  // safety net: never leave anything stuck hidden (e.g. during view transitions)
  clearTimeout(applyReveal._t);
  applyReveal._t=setTimeout(()=>{$$(".reveal:not(.in)",root).forEach(n=>{
    n.classList.add("in");countUpIn(n);if(_revObs)_revObs.unobserve(n);});},900);
}
function countUpIn(node){
  if(_reduceMotion())return;
  $$(".val,.gauge .num b",node).forEach(elm=>{if(elm.__cu)return;elm.__cu=1;
    const tn=elm.firstChild; if(!tn||tn.nodeType!==3)return;
    const raw=tn.nodeValue; const m=raw.match(/-?[\d,]+(\.\d+)?/); if(!m)return;
    const num=parseFloat(m[0].replace(/,/g,"")); if(!isFinite(num))return;
    const dec=(m[1]||"").length?m[1].length-1:0; const pre=raw.slice(0,m.index); const suf=raw.slice(m.index+m[0].length);
    const dur=850,t0=performance.now();
    const fmtn=x=>x.toFixed(dec).replace(/\B(?=(\d{3})+(?!\d))/g,",");
    const step=t=>{const p=Math.min((t-t0)/dur,1);const e=1-Math.pow(1-p,3);
      tn.nodeValue=pre+fmtn(num*e)+suf; if(p<1)requestAnimationFrame(step); else tn.nodeValue=raw;};
    tn.nodeValue=pre+fmtn(0)+suf; requestAnimationFrame(step);});
}

/* ---------- location intelligence: geolocation → timezone → manual ---------- */
function detectLocation(cb){ /* cb({lat,lon}) or cb(null); never hangs */
  if(!("geolocation" in navigator)){cb(null);return;}
  let done=false; const finish=v=>{if(!done){done=true;cb(v);}};
  try{
    navigator.geolocation.getCurrentPosition(
      p=>finish({lat:p.coords.latitude,lon:p.coords.longitude}),
      ()=>finish(null),{timeout:6000,maximumAge:600000});
    setTimeout(()=>finish(null),7000);
  }catch(e){finish(null);}
}
function tzGuessCity(){ /* IANA timezone → sensible default city */
  const tz=((Intl.DateTimeFormat().resolvedOptions().timeZone)||"").toLowerCase();
  if(/kolkata|calcutta/.test(tz))return "Delhi";
  if(/karachi|dhaka|colombo|kathmandu|asia\//.test(tz))return "Delhi";
  if(/australia|pacific\//.test(tz))return "Delhi";
  if(/america\//.test(tz))return "New York";
  if(/europe\/|africa\//.test(tz))return "London";
  return null;
}
function nearestBundledCity(lat,lon){
  const rad=x=>x*Math.PI/180; let best=null,bd=Infinity;
  DB.cities.forEach(c=>{
    const a=Math.sin(rad(c.lat-lat)/2)**2+Math.cos(rad(lat))*Math.cos(rad(c.lat))*Math.sin(rad(c.lon-lon)/2)**2;
    const d=2*6371*Math.asin(Math.sqrt(a));
    if(d<bd){bd=d;best=c;}});
  return best?{city:best,km:bd}:null;
}

    // standalone bundle: pick the best of the packaged cities for this user
    const saved=recallCity();
    if(saved&&DB.data[saved]){state.city=saved;shell();return;}
    const guess=tzGuessCity();
    if(guess&&DB.data[guess])state.city=guess;
    shell();
    detectLocation(pos=>{
      if(!pos)return;
      const near=nearestBundledCity(pos.lat,pos.lon);
      if(near&&near.city.key!==state.city){
        state.city=near.city.key;buildNav();syncLoc();renderView();}
      if(near)showToast(`Auto-selected <b>${escapeHtml(near.city.name)}</b> — nearest packaged city (~${Math.round(near.km)} km). The live backend version supports any city on Earth.`,7000);
    });
    if(!navigator.geolocation&&guess)
      setTimeout(()=>showToast(`Showing <b>${escapeHtml(guess)}</b> (guessed from your timezone). Switch anytime.`),1200);
  }
})();
</script>
